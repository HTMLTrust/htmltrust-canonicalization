name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  javascript:
    name: JavaScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run tests
        working-directory: javascript
        run: node test.js

      - uses: actions/upload-artifact@v4
        with:
          name: javascript-package
          path: |
            javascript/index.js
            javascript/index.d.ts
            javascript/package.json

  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Download dependencies
        working-directory: go
        run: go mod tidy

      - name: Run tests
        working-directory: go
        run: go test -v ./...

      - uses: actions/upload-artifact@v4
        with:
          name: go-package
          path: |
            go/canonicalize.go
            go/go.mod
            go/go.sum

  php:
    name: PHP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: intl, mbstring

      - name: Install dependencies
        working-directory: php
        run: composer install --no-interaction --prefer-dist

      - name: Run tests
        working-directory: php
        run: composer test

      - uses: actions/upload-artifact@v4
        with:
          name: php-package
          path: |
            php/src/
            php/composer.json

  conformance:
    name: Cross-language conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: intl, mbstring

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Python binding dependencies
        run: python3 -m pip install beautifulsoup4

      - name: Run cross-language conformance suite
        env:
          REQUIRE_ALL_LANGUAGES: "1"
        run: ./conformance/run-all.sh
